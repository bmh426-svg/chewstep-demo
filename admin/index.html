<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Chewstep Admin</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%9B%A0%EF%B8%8F%3C/text%3E%3C/svg%3E" />
<style>
  :root{--brand:#0e9f6e;--brand-deep:#0a7d57;--tint:#e9f7f1;--ink:#0b0d10;--soft:#5b636e;--line:#e7e9ee;--bg:#f4f6f8;--warn:#b7791f;--danger:#d9534f;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic","Segoe UI",sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;}
  a{color:var(--brand-deep);}
  /* 로그인 */
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  .login-card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:34px 30px;width:100%;max-width:380px;box-shadow:0 20px 50px rgba(16,24,40,.1);}
  .login-card h1{font-size:22px;margin-bottom:6px;}
  .login-card .sub{color:var(--soft);font-size:13px;margin-bottom:22px;}
  .fld{margin-bottom:14px;}
  .fld label{display:block;font-size:12.5px;font-weight:700;margin-bottom:6px;}
  .fld input{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 12px;font-size:14px;font-family:inherit;}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:10px;padding:11px 18px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;text-decoration:none;}
  .btn-primary{background:linear-gradient(145deg,var(--brand),var(--brand-deep));color:#fff;width:100%;}
  .btn-ghost{background:#fff;border:1px solid var(--line);color:var(--ink);}
  .btn-sm{padding:7px 12px;font-size:12.5px;border-radius:8px;}
  .msg{margin-top:12px;font-size:13px;padding:10px 12px;border-radius:8px;display:none;}
  .msg.show{display:block;}
  .msg.err{background:#fdeeee;color:#a03c39;border:1px solid #f3cfcf;}
  .msg.ok{background:var(--tint);color:var(--brand-deep);border:1px solid #cdeee0;}
  /* 비밀번호 변경 모달 */
  .pw-bg{position:fixed;inset:0;background:rgba(20,30,26,.5);display:none;align-items:center;justify-content:center;z-index:60;padding:20px;}
  .pw-bg.on{display:flex;}
  .pw-card{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:360px;box-shadow:0 20px 50px rgba(0,0,0,.2);}
  .pw-card h3{font-size:17px;margin-bottom:16px;}
  /* 앱 */
  .app{display:none;}
  .app.on{display:block;}
  .topbar{background:#fff;border-bottom:1px solid var(--line);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:10;}
  .topbar .brand{font-weight:800;font-size:16px;display:flex;align-items:center;gap:8px;}
  .topbar .brand .b{color:var(--brand-deep);}
  .topbar .who{color:var(--soft);font-size:12.5px;margin-right:12px;}
  .tabs{display:flex;gap:2px;padding:0 20px;background:#fff;border-bottom:1px solid var(--line);overflow-x:auto;}
  .tabs button{background:none;border:none;padding:13px 16px;font-size:14px;font-weight:600;color:var(--soft);cursor:pointer;border-bottom:2px solid transparent;font-family:inherit;white-space:nowrap;}
  .tabs button.active{color:var(--brand-deep);border-bottom-color:var(--brand);}
  .wrap{max-width:1200px;margin:0 auto;padding:22px 20px 60px;}
  .view{display:none;} .view.on{display:block;}
  /* 카드 */
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:22px;}
  .stat{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px 18px;}
  .stat .k{font-size:12px;color:var(--soft);font-weight:600;}
  .stat .v{font-size:26px;font-weight:800;margin-top:4px;}
  .stat .v small{font-size:13px;color:var(--soft);font-weight:600;}
  /* 툴바 */
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px;}
  .toolbar select,.toolbar input{border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;background:#fff;}
  .toolbar .spacer{flex:1;}
  .count{color:var(--soft);font-size:13px;}
  /* 테이블 */
  .tbl-wrap{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:auto;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--line);white-space:nowrap;}
  th{background:#fafbfc;font-size:12px;color:var(--soft);font-weight:700;position:sticky;top:0;}
  tbody tr{cursor:pointer;}
  tbody tr:hover{background:var(--tint);}
  td.wrap-cell{white-space:normal;max-width:240px;}
  .pill{display:inline-block;font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:999px;}
  .pill.ok{background:var(--tint);color:var(--brand-deep);}
  .pill.warn{background:#fdf6e7;color:var(--warn);}
  .pill.bad{background:#fdeeee;color:var(--danger);}
  .pill.mut{background:#eef0f2;color:var(--soft);}
  .empty{padding:40px;text-align:center;color:var(--soft);}
  /* 드로어 */
  .drawer-bg{position:fixed;inset:0;background:rgba(20,30,26,.45);display:none;z-index:50;}
  .drawer-bg.on{display:block;}
  .drawer{position:fixed;top:0;right:0;bottom:0;width:min(560px,94vw);background:#fff;z-index:51;transform:translateX(100%);transition:transform .25s;overflow-y:auto;box-shadow:-10px 0 40px rgba(0,0,0,.15);}
  .drawer.on{transform:none;}
  .drawer-head{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--line);padding:16px 20px;display:flex;justify-content:space-between;align-items:center;}
  .drawer-head h2{font-size:17px;}
  .drawer-x{border:none;background:none;font-size:24px;cursor:pointer;color:var(--soft);}
  .drawer-body{padding:18px 20px;}
  .sec{margin-bottom:20px;}
  .sec h3{font-size:12px;font-weight:800;color:var(--brand-deep);text-transform:uppercase;letter-spacing:.03em;margin-bottom:8px;}
  .kv{display:grid;grid-template-columns:130px 1fr;gap:6px 12px;font-size:13px;}
  .kv .k{color:var(--soft);}
  .kv .v{color:var(--ink);word-break:break-word;}
  .box{background:#fafbfc;border:1px solid var(--line);border-radius:10px;padding:12px 14px;font-size:13px;line-height:1.6;}
  .box b{color:var(--ink);}
  .timeline{list-style:none;font-size:12.5px;}
  .timeline li{padding:6px 0;border-bottom:1px dashed var(--line);display:flex;gap:10px;}
  .timeline .t{color:var(--soft);white-space:nowrap;font-variant-numeric:tabular-nums;}
  .timeline .e{font-weight:700;}
  .muted{color:var(--soft);}
  pre.json{background:#0f1a20;color:#cfe9df;border-radius:10px;padding:12px;font-size:11.5px;overflow:auto;max-height:220px;}
</style>
</head>
<body>

<!-- ===== 로그인 ===== -->
<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <h1>Chewstep <span style="color:var(--brand-deep)">Admin</span></h1>
    <p class="sub">관리자 계정으로 로그인하세요.</p>
    <form id="loginForm">
      <div class="fld"><label>이메일</label><input type="email" id="email" autocomplete="username" required /></div>
      <div class="fld"><label>비밀번호</label><input type="password" id="password" autocomplete="current-password" required /></div>
      <button type="submit" class="btn btn-primary" id="loginBtn">로그인</button>
      <div class="msg err" id="loginMsg"></div>
    </form>
  </div>
</div>

<!-- ===== 관리자 앱 ===== -->
<div class="app" id="app">
  <div class="topbar">
    <div class="brand">🛠️ Chewstep <span class="b">Admin</span></div>
    <div style="display:flex;align-items:center;gap:8px">
      <span class="who" id="whoami"></span>
      <button class="btn btn-ghost btn-sm" id="pwBtn">비밀번호 변경</button>
      <button class="btn btn-ghost btn-sm" id="logoutBtn">로그아웃</button>
    </div>
  </div>
  <div class="tabs">
    <button data-tab="dash" class="active">대시보드</button>
    <button data-tab="analyses">분석 기록</button>
    <button data-tab="feedback">피드백</button>
    <button data-tab="users">사용자</button>
    <button data-tab="audit">감사 로그</button>
    <button data-tab="inquiries">문의·신청</button>
  </div>

  <div class="wrap">
    <!-- 대시보드 -->
    <div class="view on" id="view-dash">
      <div class="cards" id="statCards"></div>
      <h3 style="font-size:13px;color:var(--soft);margin:8px 0 10px;">최근 분석</h3>
      <div class="tbl-wrap"><table id="recentTbl"></table></div>
    </div>

    <!-- 분석 기록 -->
    <div class="view" id="view-analyses">
      <div class="toolbar">
        <select id="fStatus"><option value="">상태 전체</option><option value="completed">완료</option><option value="low_motion">움직임 적음</option><option value="reshoot_low_face">재촬영</option></select>
        <select id="fFeedback"><option value="">피드백 전체</option><option value="yes">피드백 있음</option><option value="no">피드백 없음</option></select>
        <input type="text" id="fSearch" placeholder="고민·닉네임 검색" />
        <span class="spacer"></span>
        <span class="count" id="aCount"></span>
        <button class="btn btn-ghost btn-sm" id="csvBtn">CSV 다운로드</button>
      </div>
      <div class="tbl-wrap"><table id="analysesTbl"></table></div>
    </div>

    <!-- 피드백 -->
    <div class="view" id="view-feedback">
      <div class="tbl-wrap"><table id="feedbackTbl"></table></div>
    </div>

    <!-- 사용자 -->
    <div class="view" id="view-users">
      <div class="toolbar">
        <span class="count" id="uCount"></span>
        <span class="spacer"></span>
        <button class="btn btn-ghost btn-sm" id="uRefresh">새로고침</button>
      </div>
      <div class="tbl-wrap"><table id="usersTbl"></table></div>
    </div>

    <!-- 감사 로그 (운영·보안 이벤트, append-only) -->
    <div class="view" id="view-audit">
      <div class="toolbar">
        <select id="fAction"><option value="">액션 전체</option><option value="login_success">로그인</option><option value="logout">로그아웃</option><option value="role_change">역할 변경</option><option value="account_toggle">계정 활성·정지</option><option value="comment_create">댓글 작성</option></select>
        <span class="spacer"></span>
        <span class="count" id="lgCount"></span>
        <button class="btn btn-ghost btn-sm" id="lgRefresh">새로고침</button>
      </div>
      <div class="tbl-wrap"><table id="auditTbl"></table></div>
    </div>

    <!-- 문의 -->
    <div class="view" id="view-inquiries">
      <div class="tbl-wrap"><table id="inquiriesTbl"></table></div>
    </div>
  </div>
</div>

<!-- 상세 드로어 -->
<div class="drawer-bg" id="drawerBg"></div>
<aside class="drawer" id="drawer">
  <div class="drawer-head"><h2>분석 상세</h2><button class="drawer-x" id="drawerX">&times;</button></div>
  <div class="drawer-body" id="drawerBody"></div>
</aside>

<!-- 비밀번호 변경 -->
<div class="pw-bg" id="pwBg">
  <div class="pw-card">
    <h3>비밀번호 변경</h3>
    <div class="fld"><label>새 비밀번호 (8자 이상)</label><input type="password" id="pwNew" autocomplete="new-password" /></div>
    <div class="fld"><label>새 비밀번호 확인</label><input type="password" id="pwNew2" autocomplete="new-password" /></div>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn btn-ghost btn-sm" id="pwCancel" style="flex:1">취소</button>
      <button class="btn btn-primary btn-sm" id="pwSave" style="flex:2">변경하기</button>
    </div>
    <div class="msg" id="pwMsg"></div>
  </div>
</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const SUPA_URL = "https://adiqnrdgsmszmqvveoow.supabase.co";
const SUPA_KEY = "sb_publishable_Asd-GkMXUFf-pGwtM3Bxag_4jECoxv_";
// 관리자 세션을 홈페이지 세션과 완전 분리한다.
// 별도 storageKey → 홈에서 로그인해도 /admin은 자동으로 열리지 않고, 관리자 로그인을 따로 해야 함.
const supabase = createClient(SUPA_URL, SUPA_KEY, {
  auth: {
    storageKey: "cs-admin-auth",   // 홈(기본 sb-*-auth-token)과 다른 저장소
    persistSession: true,
    autoRefreshToken: true,
    detectSessionInUrl: false,     // 관리자 페이지는 OAuth 리다이렉트 없음
  },
});

const $ = id => document.getElementById(id);
const esc = s => String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const fmtDt = s => { const d=new Date(s); return d.toLocaleString("ko-KR",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"}); };
const fmtT = s => new Date(s).toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit",second:"2-digit"});

const HELP={much:"매우 도움",some:"조금 도움",unsure:"모르겠음",none:"도움 안됨"};
const REUSE={yes:"또 쓸래요",maybe:"상황 보고",no:"아니요"};
const USE={observation:"영상 관찰",interpret:"설문 해석",action:"다음 행동",consult:"상담 기준",etc:"기타"};
const QUAL={high:"충분",medium:"보통",low_face:"얼굴부족",low_motion:"움직임적음"};
const STAT={completed:["완료","ok"],low_motion:["움직임적음","warn"],reshoot_low_face:["재촬영","bad"]};

let ALL = [];   // demo_responses
let INQ = [];   // inquiries
let USERS = []; // profiles
let AUDIT = []; // audit_logs

function maskEmail(e){ if(!e) return ""; const [a,b]=String(e).split("@"); if(!b) return "***"; return a.slice(0,2)+"***@"+b; }
function answersOf(r){ return r.answers||{}; }
function metricsOf(r){ return r.video_metrics||{}; }
function fbOf(r){ return r.feedback||{}; }
function concernOf(r){ const a=answersOf(r); return a.concern_type || a.concern_text || "-"; }
function hasFb(r){ const f=fbOf(r); return !!(f.helpful||f.most_useful||f.reuse_intent||f.feedback_text||f.comment||f.result_similarity); }

/* ---------- 인증 (role 기반) ----------
   이메일 하드코딩 폐기. profiles.role in (admin, super_admin) 인지만 확인한다.
   화면 숨김은 UX일 뿐, 실제 보안은 Supabase RLS(admin_read_all_*)가 담당. */
let ME = null;   // 내 profiles 행
async function checkAdmin(){
  const { data:{ session } } = await supabase.auth.getSession();
  if(!session) return false;
  const { data, error } = await supabase.rpc("is_admin");
  if(error){ console.warn(error); return false; }
  return data === true;
}
async function boot(){
  const ok = await checkAdmin();
  if(ok){
    const { data:{ user } } = await supabase.auth.getUser();
    const { data:prof } = await supabase.from("profiles").select("*").eq("id", user.id).maybeSingle();
    ME = prof;
    $("whoami").textContent = user ? (user.email + (prof ? " · " + prof.role : "")) : "";
    // 최근 로그인 기록(본인 행 last_login_at만 갱신 — 권한변경 트리거에 걸리지 않음)
    supabase.from("profiles").update({ last_login_at: new Date().toISOString() }).eq("id", user.id).then(()=>{}, ()=>{});
    // 감사 로그: 관리자 로그인 성공
    supabase.rpc("log_audit", { p_action:"login_success", p_target_type:"admin" }).then(()=>{}, ()=>{});
    $("loginWrap").style.display="none";
    $("app").classList.add("on");
    await loadAll();
  } else {
    $("loginWrap").style.display="flex";
    $("app").classList.remove("on");
  }
}
$("loginForm").addEventListener("submit", async e=>{
  e.preventDefault();
  const btn=$("loginBtn"), m=$("loginMsg"); m.classList.remove("show");
  btn.disabled=true; btn.textContent="로그인 중…";
  const { error } = await supabase.auth.signInWithPassword({ email:$("email").value.trim(), password:$("password").value });
  if(error){ m.textContent="로그인 실패: "+error.message; m.classList.add("show"); btn.disabled=false; btn.textContent="로그인"; return; }
  const ok = await checkAdmin();
  if(!ok){ m.textContent="관리자 권한이 없는 계정입니다."; m.classList.add("show"); await supabase.auth.signOut(); btn.disabled=false; btn.textContent="로그인"; return; }
  await boot();
});
$("logoutBtn").addEventListener("click", async ()=>{
  try{ await supabase.rpc("log_audit", { p_action:"logout", p_target_type:"admin" }); }catch(e){}
  await supabase.auth.signOut(); location.reload();
});

/* ---------- 데이터 로드 ---------- */
async function loadAll(){
  const { data:dr, error:e1 } = await supabase.from("demo_responses").select("*").order("created_at",{ascending:false}).limit(500);
  if(e1){ alert("분석 데이터 로드 실패: "+e1.message); return; }
  ALL = dr||[];
  const { data:iq } = await supabase.from("inquiries").select("*").order("created_at",{ascending:false}).limit(500);
  INQ = iq||[];
  const { data:pf } = await supabase.from("profiles").select("*").order("created_at",{ascending:true});
  USERS = pf||[];
  const { data:ad } = await supabase.from("audit_logs").select("*").order("created_at",{ascending:false}).limit(500);
  AUDIT = ad||[];
  renderDash(); renderAnalyses(); renderFeedback(); renderUsers(); renderAudit(); renderInquiries();
}

/* ---------- 대시보드 ---------- */
function renderDash(){
  const total=ALL.length;
  const today=ALL.filter(r=>{ const d=new Date(r.created_at); const n=new Date(); return d.toDateString()===n.toDateString(); }).length;
  const success=ALL.filter(r=>r.status==="completed").length;
  const lowq=ALL.filter(r=>r.status && r.status!=="completed").length;
  const fbCount=ALL.filter(hasFb).length;
  const reuseYes=ALL.filter(r=>fbOf(r).reuse_intent==="yes").length;
  const cards=[
    ["전체 분석",total],
    ["오늘 분석",today],
    ["분석 성공",success+" <small>/ "+total+"</small>"],
    ["저품질·재촬영",lowq],
    ["피드백 응답",fbCount],
    ["재사용 의향(yes)",reuseYes],
    ["문의·신청",INQ.length],
  ];
  $("statCards").innerHTML = cards.map(([k,v])=>`<div class="stat"><div class="k">${k}</div><div class="v">${v}</div></div>`).join("");
  // 최근 8건
  $("recentTbl").innerHTML = tblHead(["일시","월령","고민","품질","상태","피드백"]) +
    "<tbody>"+ALL.slice(0,8).map(r=>rowAnalysis(r,true)).join("")+"</tbody>";
  bindRows("recentTbl");
}

/* ---------- 분석 목록 ---------- */
function tblHead(cols){ return "<thead><tr>"+cols.map(c=>`<th>${c}</th>`).join("")+"</tr></thead>"; }
function qualPill(q){ const [l,c]=[QUAL[q]||q||"-", q==="high"?"ok":(q?"warn":"mut")]; return `<span class="pill ${c}">${l}</span>`; }
function statPill(s){ const m=STAT[s]; return m?`<span class="pill ${m[1]}">${m[0]}</span>`:`<span class="pill mut">${s||"-"}</span>`; }
function rowAnalysis(r,short){
  const a=answersOf(r), mt=metricsOf(r), f=fbOf(r);
  const mo = a.child_age_months!=null ? a.child_age_months+"개월" : (r.age_band||"-");
  const fb = hasFb(r) ? (HELP[f.helpful]||"응답") : '<span class="muted">미응답</span>';
  return `<tr data-id="${esc(r.id)}">`+
    `<td>${fmtDt(r.created_at)}</td>`+
    `<td>${esc(mo)}</td>`+
    `<td class="wrap-cell">${esc(concernOf(r))}</td>`+
    `<td>${qualPill(mt.quality)}</td>`+
    `<td>${statPill(r.status)}</td>`+
    `<td>${fb}</td>`+
    `</tr>`;
}
function filtered(){
  const st=$("fStatus").value, fb=$("fFeedback").value, q=$("fSearch").value.trim().toLowerCase();
  return ALL.filter(r=>{
    if(st && r.status!==st) return false;
    if(fb==="yes" && !hasFb(r)) return false;
    if(fb==="no" && hasFb(r)) return false;
    if(q){ const hay=(concernOf(r)+" "+(r.nickname||"")).toLowerCase(); if(!hay.includes(q)) return false; }
    return true;
  });
}
function renderAnalyses(){
  const rows=filtered();
  $("aCount").textContent = rows.length+"건";
  $("analysesTbl").innerHTML = tblHead(["일시","월령","고민","품질","상태","피드백"]) +
    (rows.length?("<tbody>"+rows.map(r=>rowAnalysis(r)).join("")+"</tbody>"):"") ;
  if(!rows.length) $("analysesTbl").innerHTML += `<tbody><tr><td colspan="6"><div class="empty">데이터가 없어요.</div></td></tr></tbody>`;
  bindRows("analysesTbl");
}
["fStatus","fFeedback","fSearch"].forEach(id=>$(id).addEventListener("input",renderAnalyses));
$("uRefresh").addEventListener("click", loadAll);
$("lgRefresh").addEventListener("click", loadAll);
$("fAction").addEventListener("change", renderAudit);

/* ---------- 피드백 목록 ---------- */

/* ---------- 사용자 목록 (오늘: 조회 전용) ---------- */
const ROLE_LABEL={user:"보호자",staff:"어린이집",admin:"관리자",super_admin:"최고관리자"};
function roleCls(r){ return (r==="admin"||r==="super_admin")?"ok":(r==="staff"?"warn":"mut"); }
function renderUsers(){
  const cnt={}; ALL.forEach(r=>{ if(r.user_id) cnt[r.user_id]=(cnt[r.user_id]||0)+1; });
  $("uCount").textContent = USERS.length+"명";
  const body = USERS.map(u=>
    `<tr>`+
    `<td>${esc(u.email||"-")}</td>`+
    `<td>${esc(u.display_name||"-")}</td>`+
    `<td><span class="pill ${roleCls(u.role)}">${esc(ROLE_LABEL[u.role]||u.role||"-")}</span></td>`+
    `<td>${u.created_at?fmtDt(u.created_at):"-"}</td>`+
    `<td>${u.last_login_at?fmtDt(u.last_login_at):'<span class="muted">-</span>'}</td>`+
    `<td>${u.is_active?'<span class="pill ok">활성</span>':'<span class="pill bad">정지</span>'}</td>`+
    `<td>${cnt[u.id]||0}</td>`+
    `</tr>`).join("");
  $("usersTbl").innerHTML = tblHead(["이메일","이름","역할","가입","최근 로그인","활성","분석"]) +
    (USERS.length?`<tbody>${body}</tbody>`:`<tbody><tr><td colspan="7"><div class="empty">사용자가 없어요.</div></td></tr></tbody>`);
}

/* ---------- 감사 로그 (조회 전용, append-only) ---------- */
const ACTION_LABEL={login_success:"로그인",logout:"로그아웃",role_change:"역할 변경",account_toggle:"계정 활성·정지",comment_create:"댓글 작성",analysis_view:"결과 조회",analysis_update:"결과 수정",data_delete:"삭제"};
function actionCls(a){ return a==="role_change"?"bad":(a==="account_toggle"||a==="data_delete"?"warn":(a==="login_success"?"ok":"mut")); }
function auditDetail(r){
  const m=r.metadata||{};
  if(r.action==="role_change") return `${esc(m.target_email||r.target_id||"")}: ${esc(m.from)} → ${esc(m.to)}`;
  if(r.action==="account_toggle") return `${esc(m.target_email||r.target_id||"")}: ${m.is_active?"활성화":"정지"}`;
  return esc(m.text||JSON.stringify(m===null?{}:m)).slice(0,160);
}
function renderAudit(){
  const f=$("fAction").value;
  const rows = f ? AUDIT.filter(r=>r.action===f) : AUDIT;
  $("lgCount").textContent = rows.length+"건";
  const body = rows.map(r=>
    `<tr>`+
    `<td>${fmtDt(r.created_at)}</td>`+
    `<td><span class="pill ${actionCls(r.action)}">${esc(ACTION_LABEL[r.action]||r.action)}</span></td>`+
    `<td>${esc(r.actor_email||"시스템/서버")}</td>`+
    `<td class="wrap-cell">${auditDetail(r)}</td>`+
    `</tr>`).join("");
  $("auditTbl").innerHTML = tblHead(["일시","액션","수행자","상세"]) +
    (rows.length?`<tbody>${body}</tbody>`:`<tbody><tr><td colspan="4"><div class="empty">기록이 없어요.</div></td></tr></tbody>`);
}

/* ---------- 문의 목록 ---------- */

  $("inquiriesTbl").innerHTML = tblHead(["일시","유형","이메일","내용","메일발송"]) +

/* ---------- 상세 드로어 ---------- */
function bindRows(tblId){
  $(tblId).querySelectorAll("tbody tr[data-id]").forEach(tr=>{
    tr.addEventListener("click",()=>openDetail(tr.getAttribute("data-id")));
  });
}
async function openDetail(id){
  const r=ALL.find(x=>String(x.id)===String(id)); if(!r) return;
  const a=answersOf(r), mt=metricsOf(r), res=r.result||{}, f=fbOf(r);
  const kv = (o,map) => Object.entries(o).map(([k,v])=>`<div class="k">${esc(map&&map[k]||k)}</div><div class="v">${esc(typeof v==="object"?JSON.stringify(v):v)}</div>`).join("");
  let body = "";
  body += `<div class="sec"><h3>기본</h3><div class="kv">`+
    `<div class="k">분석 일시</div><div class="v">${fmtDt(r.created_at)}</div>`+
    `<div class="k">상태</div><div class="v">${statPill(r.status)}</div>`+
    `<div class="k">닉네임</div><div class="v">${esc(r.nickname||"-")}</div>`+
    `<div class="k">동의</div><div class="v">${r.consent?"예":"아니오"}</div>`+
    `<div class="k">session_id</div><div class="v muted">${esc(r.session_id||"-")}</div>`+
    `</div></div>`;
  body += `<div class="sec"><h3>보호자 입력</h3><div class="box">`+
    `월령: <b>${esc(a.child_age_months!=null?a.child_age_months+"개월":(r.age_band||"-"))}</b><br>`+
    `가장 큰 고민: <b>${esc(a.concern_type||"-")}</b><br>`+
    `음식 형태: <b>${esc(a.food_texture||"-")}</b><br>`+
    `직접 작성: ${esc(a.concern_text||"-")}`+
    `</div></div>`;
  body += `<div class="sec"><h3>영상 지표</h3><div class="box">`+
    `영상 길이: <b>${esc(mt.duration_sec!=null?mt.duration_sec+"초":"-")}</b> · 얼굴 인식률: <b>${esc(mt.detect_rate!=null?mt.detect_rate+"%":"-")}</b><br>`+
    `씹기 추정: <b>${esc(mt.chews_per_min!=null?mt.chews_per_min+"/분":"-")}</b> (count ${esc(mt.chew_count!=null?mt.chew_count:"-")}) · 품질: ${qualPill(mt.quality)}<br>`+
    `최대 턱 열림: <b>${esc(mt.max_jaw_open!=null?mt.max_jaw_open:"-")}</b> · 좌우 ${esc(mt.left_pct!=null?mt.left_pct:"-")}:${esc(mt.right_pct!=null?mt.right_pct:"-")}<br>`+
    `엔진: ${esc(mt.engine_version||mt.engine||"-")} · result_version: ${esc(mt.result_version||"-")}`+
    `</div></div>`;
  body += `<div class="sec"><h3>사용자에게 나간 결과</h3><div class="box">`+
    (Object.keys(res).length?
      `다음 행동: <b>${esc(res.action||"-")}</b><br>신뢰도: <b>${esc(res.confidence||"-")}</b> · 상태: ${esc(res.status||"-")}<br>`+
      (res.vs_prev?`전후변화: 지난 ${esc(res.vs_prev.chews_per_min_prev)} → 이번 ${esc((res.observation||{}).chews_per_min)} (${esc(res.vs_prev.delta_pct)}%)`:"첫 기록")
      : `<span class="muted">결과 저장 이전 데이터 (미저장)</span>`)+
    `</div></div>`;
  body += `<div class="sec"><h3>피드백</h3><div class="box">`+
    (hasFb(r)?
      `도움: <b>${esc(HELP[f.helpful]||f.helpful||"-")}</b> · 재사용: <b>${esc(REUSE[f.reuse_intent]||f.reuse_intent||"-")}</b><br>`+
      `가장 도움된 부분: ${esc(USE[f.most_useful]||f.most_useful||"-")}<br>`+
      `의견: ${esc(f.feedback_text||f.comment||"-")}`+
      (f.result_similarity?`<br>실제와 일치: ${esc(f.result_similarity)}`:"")
      : `<span class="muted">미응답</span>`)+
    `</div></div>`;
  // journey 타임라인
  body += `<div class="sec"><h3>여정 타임라인</h3><ul class="timeline" id="tl"><li class="muted">불러오는 중…</li></ul></div>`;
  $("drawerBody").innerHTML = body;
  openDrawer();
  // journey_events 조회
  let q = supabase.from("journey_events").select("created_at,event_type,page,path,meta").order("created_at",{ascending:true}).limit(100);
  q = r.session_id ? q.eq("session_id", r.session_id) : q.eq("anon_id", r.anon_id||"__none__");
  const { data:ev } = await q;
  const tl=$("tl");
  if(ev && ev.length){
    tl.innerHTML = ev.map(e=>`<li><span class="t">${fmtT(e.created_at)}</span><span class="e">${esc(e.event_type)}</span><span class="muted">${esc(e.page||e.path||"")}</span></li>`).join("");
  } else tl.innerHTML = `<li class="muted">기록 없음</li>`;
}
function openDrawer(){ $("drawerBg").classList.add("on"); $("drawer").classList.add("on"); }
function closeDrawer(){ $("drawerBg").classList.remove("on"); $("drawer").classList.remove("on"); }
$("drawerX").addEventListener("click",closeDrawer);
$("drawerBg").addEventListener("click",closeDrawer);

/* ---------- 탭 ---------- */
document.querySelectorAll(".tabs button").forEach(b=>{
  b.addEventListener("click",()=>{
    document.querySelectorAll(".tabs button").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    document.querySelectorAll(".view").forEach(v=>v.classList.remove("on"));
    $("view-"+b.dataset.tab).classList.add("on");
  });
});

/* ---------- CSV (마스킹) ---------- */
$("csvBtn").addEventListener("click",()=>{
  const rows=filtered();
  const head=["분석일시","월령","고민유형","고민텍스트","음식형태","영상길이","얼굴인식률","씹기추정","품질","상태","결과행동","신뢰도","도움","재사용","의견"];
  const lines=[head.join(",")];
  rows.forEach(r=>{ const a=answersOf(r),mt=metricsOf(r),res=r.result||{},f=fbOf(r);
    const c=[fmtDt(r.created_at),a.child_age_months!=null?a.child_age_months:(r.age_band||""),a.concern_type||"",a.concern_text||"",
      a.food_texture||"",mt.duration_sec!=null?mt.duration_sec:"",mt.detect_rate!=null?mt.detect_rate:"",mt.chews_per_min!=null?mt.chews_per_min:"",
      mt.quality||"",r.status||"",res.action||"",res.confidence||"",HELP[f.helpful]||f.helpful||"",REUSE[f.reuse_intent]||f.reuse_intent||"",f.feedback_text||f.comment||""];
    lines.push(c.map(v=>`"${String(v==null?"":v).replace(/"/g,'""')}"`).join(","));
  });
  const blob=new Blob(["﻿"+lines.join("\n")],{type:"text/csv;charset=utf-8"});
  const url=URL.createObjectURL(blob); const a=document.createElement("a");
  a.href=url; a.download="chewstep_analyses.csv"; a.click(); URL.revokeObjectURL(url);
});

/* ---------- 비밀번호 변경 ---------- */
$("pwBtn").addEventListener("click",()=>{ $("pwMsg").className="msg"; $("pwNew").value=""; $("pwNew2").value=""; $("pwBg").classList.add("on"); $("pwNew").focus(); });
$("pwCancel").addEventListener("click",()=>$("pwBg").classList.remove("on"));
$("pwBg").addEventListener("click",e=>{ if(e.target===$("pwBg")) $("pwBg").classList.remove("on"); });
$("pwSave").addEventListener("click",async ()=>{
  const m=$("pwMsg"), p1=$("pwNew").value, p2=$("pwNew2").value;
  if(p1.length<8){ m.textContent="8자 이상 입력해 주세요."; m.className="msg err show"; return; }
  if(p1!==p2){ m.textContent="두 비밀번호가 일치하지 않아요."; m.className="msg err show"; return; }
  $("pwSave").disabled=true;
  const { error } = await supabase.auth.updateUser({ password:p1 });
  $("pwSave").disabled=false;
  if(error){ m.textContent="변경 실패: "+error.message; m.className="msg err show"; return; }
  m.textContent="비밀번호가 변경됐어요 ✅ 다음 로그인부터 새 비밀번호를 쓰세요."; m.className="msg ok show";
  setTimeout(()=>$("pwBg").classList.remove("on"), 1800);
});

boot();
