<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>공지 글쓰기 · Chewstep</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9C%8F%EF%B8%8F%3C/text%3E%3C/svg%3E" />
<link rel="stylesheet" href="/assets/css/site.css" />
<style>
  body{ background:var(--bg-soft); }
  .wrap-w{ max-width:720px; margin:0 auto; padding:40px 20px 80px; }
  .topbar{ display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; }
  .topbar .brand{ display:inline-flex; align-items:center; gap:8px; font-weight:800; color:var(--ink); text-decoration:none; letter-spacing:-.02em; font-size:18px; }
  .topbar .brand .logo{ width:30px;height:30px;display:grid;place-items:center;background:var(--brand);border-radius:9px; }
  .back{ font-size:14px; font-weight:600; color:var(--ink-soft); text-decoration:none; }
  .card{ background:#fff; border:1px solid var(--line); border-radius:20px; box-shadow:var(--shadow-md); padding:30px 28px; }
  .card h1{ font-size:24px; color:var(--ink); letter-spacing:-.02em; font-weight:800; margin-bottom:6px; }
  .card .sub{ font-size:14px; color:var(--ink-soft); margin-bottom:22px; }
  .field{ margin-bottom:18px; }
  .field label{ display:block; font-size:13.5px; font-weight:700; color:var(--ink); margin-bottom:7px; }
  .field input[type=text], .field select, .field textarea{
    width:100%; border:1px solid var(--line); border-radius:12px; padding:12px 14px;
    font-size:15px; font-family:inherit; color:var(--ink); background:#fff; }
  .field textarea{ min-height:200px; resize:vertical; line-height:1.6; }
  .field input:focus, .field select:focus, .field textarea:focus{ outline:2px solid var(--brand); outline-offset:1px; border-color:var(--brand); }
  .row{ display:flex; gap:14px; flex-wrap:wrap; }
  .row .field{ flex:1; min-width:180px; }
  .checks{ display:flex; gap:22px; flex-wrap:wrap; margin:4px 0 22px; }
  .checks label{ display:inline-flex; align-items:center; gap:8px; font-size:14px; font-weight:600; color:var(--ink-2); cursor:pointer; }
  .actions{ display:flex; gap:12px; align-items:center; }
  .btn{ display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:12px 22px; border-radius:12px; font-weight:800; font-size:15px; text-decoration:none; border:none; cursor:pointer; }
  .btn-primary{ background:var(--brand); color:#fff; }
  .btn-primary:disabled{ opacity:.55; cursor:default; }
  .btn-ghost{ background:#fff; color:var(--ink); border:1.5px solid var(--line); }
  .msg{ margin-top:16px; font-size:14px; font-weight:600; padding:12px 14px; border-radius:12px; display:none; }
  .msg.show{ display:block; }
  .msg.ok{ background:var(--brand-tint); color:var(--brand-deep); }
  .msg.err{ background:var(--amber-tint); color:var(--amber); }
  .gate{ text-align:center; padding:48px 20px; }
  .gate h1{ font-size:22px; color:var(--ink); font-weight:800; margin-bottom:10px; }
  .gate p{ color:var(--ink-soft); font-size:15px; margin-bottom:20px; }
</style>
</head>
<body>
<div class="wrap-w">
  <div class="topbar">
    <a href="/" class="brand"><span class="logo">🥣</span> Chewstep</a>
    <a href="#" class="back" id="backLink">← 공지사항으로</a>
  </div>

  <!-- 권한 확인 중 -->
  <div class="card" id="loading"><p class="sub" style="margin:0">확인 중…</p></div>

  <!-- 비로그인/비관리자 -->
  <div class="card gate" id="gate" style="display:none;">
    <h1>관리자만 작성할 수 있어요</h1>
    <p id="gateMsg">공지 글쓰기는 관리자 계정으로 로그인해야 이용할 수 있습니다.</p>
    <a class="btn btn-primary" id="gateLogin" href="/login.html">로그인하기</a>
  </div>

  <!-- 글쓰기 폼 -->
  <form class="card" id="form" style="display:none;">
    <h1>공지 글쓰기</h1>
    <p class="sub" id="scopeSub">새 공지사항을 작성합니다.</p>

    <div class="row">
      <div class="field">
        <label for="fScope">게시 대상</label>
        <select id="fScope">
          <option value="parent">부모용</option>
          <option value="institution">기관용</option>
          <option value="all">공통(양쪽 모두)</option>
        </select>
      </div>
      <div class="field">
        <label for="fCategory">분류</label>
        <select id="fCategory">
          <option>안내</option>
          <option>공지</option>
          <option>모집</option>
          <option>이용 안내</option>
          <option>운영 안내</option>
          <option>개인정보</option>
          <option>업데이트</option>
          <option>점검</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label for="fTitle">제목</label>
      <input type="text" id="fTitle" maxlength="120" placeholder="공지 제목을 입력하세요" required />
    </div>

    <div class="field">
      <label for="fBody">내용</label>
      <textarea id="fBody" placeholder="공지 내용을 입력하세요. 줄바꿈은 그대로 표시됩니다." required></textarea>
    </div>

    <div class="checks">
      <label><input type="checkbox" id="fPublished" checked /> 바로 게시</label>
      <label><input type="checkbox" id="fPinned" /> 상단 고정</label>
    </div>

    <div class="actions">
      <button type="submit" class="btn btn-primary" id="submitBtn">게시하기</button>
      <a href="#" class="btn btn-ghost" id="cancelBtn">취소</a>
    </div>
    <div class="msg" id="msg"></div>
  </form>
</div>

<script type="module">
  import { supabase } from "/assets/js/supabase.js";

  const q = new URLSearchParams(location.search);
  const scope = ["parent", "institution", "all"].includes(q.get("scope")) ? q.get("scope") : "parent";
  const listUrl = scope === "institution" ? "/institutions/notice/" : "/notice.html";

  const $ = function (id) { return document.getElementById(id); };
  $("backLink").href = listUrl;
  $("cancelBtn").href = listUrl;

  function show(el) { el.style.display = ""; }
  function hide(el) { el.style.display = "none"; }

  (async function init() {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) {
      hide($("loading")); show($("gate"));
      $("gateMsg").textContent = "공지 글쓰기는 관리자 계정으로 로그인해야 이용할 수 있습니다.";
      $("gateLogin").href = "/login.html?next=" + encodeURIComponent("/notice-write.html?scope=" + scope);
      return;
    }
    let isAdmin = false;
    try { const { data } = await supabase.rpc("is_admin"); isAdmin = !!data; } catch (e) {}
    if (!isAdmin) {
      hide($("loading")); show($("gate"));
      $("gateMsg").textContent = "이 계정에는 공지 작성 권한이 없습니다. 관리자 계정으로 로그인해 주세요.";
      $("gateLogin").textContent = "다른 계정으로 로그인";
      $("gateLogin").href = "/login.html?next=" + encodeURIComponent("/notice-write.html?scope=" + scope);
      return;
    }
    // 관리자 → 폼 표시
    hide($("loading")); show($("form"));
    $("fScope").value = scope;
    const label = { parent: "부모용", institution: "기관용", all: "공통" }[scope];
    $("scopeSub").textContent = "‘" + label + "’ 공지사항에 게시됩니다. 대상은 아래에서 변경할 수 있어요.";

    $("form").addEventListener("submit", async function (e) {
      e.preventDefault();
      const title = $("fTitle").value.trim();
      const body = $("fBody").value.trim();
      const msg = $("msg");
      if (!title || !body) {
        msg.className = "msg err show"; msg.textContent = "제목과 내용을 모두 입력해 주세요."; return;
      }
      $("submitBtn").disabled = true;
      msg.className = "msg show"; msg.textContent = "게시 중…";
      const { error } = await supabase.from("notices").insert({
        scope: $("fScope").value,
        category: $("fCategory").value,
        title: title,
        body: body,
        is_published: $("fPublished").checked,
        pinned: $("fPinned").checked,
        created_by: session.user.id,
      });
      if (error) {
        $("submitBtn").disabled = false;
        msg.className = "msg err show";
        msg.textContent = "게시에 실패했어요: " + (error.message || "알 수 없는 오류");
        return;
      }
      msg.className = "msg ok show"; msg.textContent = "게시되었어요! 공지사항으로 이동합니다…";
      const target = $("fScope").value === "institution" ? "/institutions/notice/" : "/notice.html";
      setTimeout(function () { location.href = target; }, 900);
    });
  })();
</script>
</body>
</html>
